name: validate

on:
  pull_request:
    paths:
      - "data/**"
      - "schema/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
  push:
    branches: [main]
    paths:
      - "data/**"
      - "schema/**"
      - "scripts/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate data (schema + formula lint + referential)
        run: npm run validate
